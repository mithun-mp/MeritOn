    <link rel="dns-prefetch" href="https://res.cloudinary.com">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            background: 
                radial-gradient(circle at top right, rgba(37,99,235,0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(124,58,237,0.1), transparent 40%),
                var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body.light-mode {
            background: 
                radial-gradient(circle at top right, rgba(37,99,235,0.08), transparent 40%),
                radial-gradient(circle at bottom left, rgba(124,58,237,0.08), transparent 40%),
                var(--bg-color);
        }

        .result-container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: var(--space-xl);
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
        }

        .celebration-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: bounce 2s infinite ease-in-out;
        }

        .result-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .result-header p {
            color: var(--muted-text);
            font-size: 1.1rem;
            margin-bottom: 18px;
        }

        /* Status box shown while checking / after publish */
        .status-box {
            color: var(--muted-text);
            font-size: 1rem;
            margin: 0 auto 28px auto;
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            max-width: 720px;
            width: calc(100% - 40px);
            box-shadow: var(--shadow);
        }

        .status-box .status-icon { color: var(--primary-color); font-size: 1.25rem; }

        .score-display {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 24px;
            padding: var(--space-lg);
            margin: var(--space-lg) 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-md);
        }

        body.light-mode .score-display {
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.15);
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid var(--border-color);
        }

        .stat-card h2 { font-size: 2.2rem; margin: 0; color: var(--text-color); }
        .stat-card small { color: var(--muted-text); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

        .section-breakdown {
            margin-top: 28px;
            text-align: left;
        }

        .section-breakdown h3 {
            color: var(--text-color);
            margin-bottom: 16px;
            font-size: 1.15rem;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .section-card strong {
            display: block;
            font-size: 1rem;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .section-metric {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: var(--muted-text);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .section-score {
            color: var(--primary-color);
            font-size: 1.6rem;
            font-weight: 700;
        }

        .section-percentage {
            color: var(--success-color);
            font-weight: 700;
        }

        .stat-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(37, 99, 235, 0.05);
        }

        body.light-mode .stat-circle {
            background: rgba(37, 99, 235, 0.08);
        }

        .stat-circle h2 {
            font-size: 2.8rem;
            margin: 0;
            color: var(--primary-color);
        }

        .stat-circle span {
            font-size: 0.9rem;
            color: var(--muted-text);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .percentage-badge {
            background: rgba(22, 163, 74, 0.15);
            color: var(--success-color);
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        body.light-mode .percentage-badge {
            background: rgba(22, 163, 74, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.15);
        }

        .action-group {
            display: flex;
            gap: var(--space-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-premium {
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
        }

        .btn-download {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.45);
        }

        .btn-lobby {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-lobby:hover {
            background: var(--card-bg);
            transform: translateY(-3px);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Mobile Responsive Styles --- */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            .result-card {
                padding: 28px 22px;
                border-radius: 26px;
            }
            .celebration-icon {
                font-size: 4rem;
                margin-bottom: 20px;
            }
            .result-header h1 {
                font-size: 2rem;
            }
            .result-header p {
                font-size: 1rem;
            }
            .status-box {
                padding: 14px 16px;
                gap: 10px;
                border-radius: 10px;
            }
            .status-box .status-icon {
                font-size: 1.15rem;
            }
            .score-display {
                padding: var(--space-md);
                gap: var(--space-sm);
                border-radius: 20px;
            }
            .stat-card {
                padding: 16px;
                border-radius: 14px;
            }
            .stat-card h2 {
                font-size: 1.9rem;
            }
            .stat-card small {
                font-size: 0.85rem;
                letter-spacing: 0.6px;
            }
            .section-grid {
                gap: var(--space-sm);
            }
            .section-card {
                padding: 16px;
                border-radius: 16px;
                min-height: 120px;
            }
            .section-score {
                font-size: 1.4rem;
            }
            .section-breakdown h3 {
                font-size: 1.1rem;
            }
            .stat-circle {
                width: 150px;
                height: 150px;
                border-width: 7px;
            }
            .stat-circle h2 {
                font-size: 2.3rem;
            }
            .stat-circle span {
                font-size: 0.85rem;
            }
            .percentage-badge {
                padding: 7px 18px;
                font-size: 1rem;
                border-radius: 999px;
                margin-bottom: 30px;
            }
            .btn-premium {
                padding: 14px 24px;
                font-size: 0.98rem;
                border-radius: 14px;
            }
            #themeBtn {
                width: 42px;
                height: 42px;
                top: 14px;
                right: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .result-card {
                padding: 24px 16px;
                border-radius: 22px;
            }
            .celebration-icon {
                font-size: 3.5rem;
            }
            .result-header h1 {
                font-size: 1.8rem;
            }
            .score-display {
                grid-template-columns: 1fr;
            }
            .stat-card {
                padding: 14px;
            }
            .stat-card h2 {
                font-size: 1.7rem;
            }
            .stat-circle {
                width: 140px;
                height: 140px;
                border-width: 6px;
            }
            .stat-circle h2 {
                font-size: 2rem;
            }
            .action-group {
                flex-direction: column;
            }
            .action-group .btn-premium {
                width: 100%;
                padding: 13px;
                justify-content: center;
            }
            #themeBtn {
                width: 40px;
                height: 40px;
                top: 12px;
                right: 12px;
            }
        }
    </style>
</head>
<body >

    <!-- THEME TOGGLE (Floating for Result Page) -->
    <button id="themeBtn" class="nav-btn" style="position: fixed; top: 20px; right: 20px; z-index: 1000; width: 45px; height: 45px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%;">
        <i class="fas fa-moon"></i>
    </button>

    <!-- MERITON LOADING ANIMATION -->
    <div class="meriton-loader" id="meritonLoader">
        <div class="loader-content">
            <img src="assets/logo.svg" alt="M" class="loader-logo-m">
            <span class="loader-text-erit">eritOn</span>
        </div>
    </div>

    <!-- BACKGROUND WATERMARK -->
    <div class="meriton-watermark"></div>

    

    <div class="result-container">
        
        <main class="result-card">
            
            <div class="celebration-icon">
                <i class="fa-solid fa-trophy"></i>
            </div>

            <div class="result-header">
                <h1 id="resultTitle">Congratulations!</h1>
                <p id="resultSubtitle">You have successfully completed your examination.</p>
                <div id="resultStatus" class="completion-message status-box">
                    <i class="fa-solid fa-envelope-open-text status-icon"></i>
                    <div id="resultStatusText">Checking result publication status...</div>
                </div>
                <div id="resultStats" class="score-display" style="display:none;"></div>
                <div id="resultSections" class="section-breakdown" style="display:none;"></div>
            </div>

            <div class="action-group">
                <button id="downloadPaper" class="btn-premium btn-download">
                    <i class="fa-solid fa-file-pdf"></i>
                    Download Question Paper
                </button>
                
                <button onclick="window.location.href='test-lobby.html'" class="btn-premium btn-lobby">
                    <i class="fa-solid fa-house"></i>
                    Back to Lobby
                </button>
            </div>
            
        </main>
        
    </div>

    <script src="js/trust-ui.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/schema.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/result.js"></script>

    <script>
        // MeritOn loading animation control - runs only once per session
        window.addEventListener('load', function() {
            const loader = document.getElementById('meritonLoader');
            if (loader && !sessionStorage.getItem('meriton_loader_done')) {
                sessionStorage.setItem('meriton_loader_done', 'true');
                setTimeout(function() {
                    loader.classList.add('hidden');
                }, 3000);
            } else if (loader) {
                loader.classList.add('hidden');
            }
        });
    </script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

</body>
</html>
