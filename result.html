<head>

    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Exam Results — MeritOn Aptitude Platform</title>
    <link rel="stylesheet" href="css/trust.css">
    <script src="js/trust-head.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            background: 
                radial-gradient(circle at top right, rgba(37,99,235,0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(124,58,237,0.1), transparent 40%),
                #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .result-container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
        }

        .celebration-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: bounce 2s infinite ease-in-out;
        }

        .result-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: white;
        }

        .result-header p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 18px;
        }

        /* Status box shown while checking / after publish */
        .status-box {
            color: #cbd5e1;
            font-size: 1rem;
            margin: 0 auto 28px auto;
            background: rgba(255,255,255,0.03);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            max-width: 720px;
            width: calc(100% - 40px);
            box-shadow: 0 6px 18px rgba(2,6,23,0.4);
        }

        .status-box .status-icon { color: #60a5fa; font-size: 1.25rem; }

        .score-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin: 18px 0 34px 0;
            align-items: stretch;
        }

        .stat-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .stat-card h2 { font-size: 2.2rem; margin: 0; color: #e2e8f0; }
        .stat-card small { color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

        .section-breakdown {
            margin-top: 28px;
            text-align: left;
        }

        .section-breakdown h3 {
            color: #f8fafc;
            margin-bottom: 16px;
            font-size: 1.15rem;
        }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .section-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 18px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .section-card strong {
            display: block;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .section-metric {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: #cbd5e1;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .section-score {
            color: #60a5fa;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .section-percentage {
            color: #34d399;
            font-weight: 700;
        }

        .stat-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(37, 99, 235, 0.05);
        }

        .stat-circle h2 {
            font-size: 2.8rem;
            margin: 0;
            color: #60a5fa;
        }

        .stat-circle span {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .percentage-badge {
            background: rgba(22, 163, 74, 0.15);
            color: #4ade80;
            padding: 8px 20px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .action-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .btn-premium {
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            border: none;
        }

        .btn-download {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.45);
        }

        .btn-lobby {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-lobby:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .result-card {
                padding: 30px 20px;
            }
            .stat-circle {
                width: 140px;
                height: 140px;
            }
            .stat-circle h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body >

    <!-- MERITON LOADING ANIMATION -->
    <div class="meriton-loader" id="meritonLoader">
        <div class="loader-container">
            <div class="loader-branding">
                <img src="assets/logo.svg" alt="MeritOn" class="loader-branding-logo">
                <span class="loader-branding-text">MeritOn</span>
            </div>
            <div class="loader-logo-wrapper">
                <img src="assets/logo.svg" alt="MeritOn" class="loader-logo">
            </div>
        </div>
    </div>

    <!-- BACKGROUND WATERMARK -->
    <div class="meriton-watermark"></div>

    

    <div class="result-container">
        
        <main class="result-card">
            
            <div class="celebration-icon">
                <i class="fa-solid fa-trophy"></i>
            </div>

            <div class="result-header">
                <h1 id="resultTitle">Congratulations!</h1>
                <p id="resultSubtitle">You have successfully completed your examination.</p>
                <div id="resultStatus" class="completion-message status-box">
                    <i class="fa-solid fa-envelope-open-text status-icon"></i>
                    <div id="resultStatusText">Checking result publication status...</div>
                </div>
                <div id="resultStats" class="score-display" style="display:none;"></div>
                <div id="resultSections" class="section-breakdown" style="display:none;"></div>
            </div>

            <div class="action-group">
                <button id="downloadPaper" class="btn-premium btn-download">
                    <i class="fa-solid fa-file-pdf"></i>
                    Download Question Paper
                </button>
                
                <button onclick="window.location.href='test-lobby.html'" class="btn-premium btn-lobby">
                    <i class="fa-solid fa-house"></i>
                    Back to Lobby
                </button>
            </div>
            
        </main>
        
    </div>

    <script src="js/debug.js"></script>
    <script src="js/trust-ui.js"></script>
    <script src="js/modals.js"></script>
    <script src="js/schema.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/result.js"></script>

    <script>
        // MeritOn loading animation control - runs only once per session
        window.addEventListener('load', function() {
            const loader = document.getElementById('meritonLoader');
            if (loader && !sessionStorage.getItem('meriton_loader_done')) {
                sessionStorage.setItem('meriton_loader_done', 'true');
                setTimeout(function() {
                    loader.classList.add('hidden');
                }, 3000);
            } else if (loader) {
                loader.classList.add('hidden');
            }
        });
    </script>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

</body>
</html>
